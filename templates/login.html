<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Login – BRAVYNEX </title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1a56db; --blue-dark: #1447b0; --text: #1e2d40;
    --muted: #6b7a90; --border: #dce3ee; --white: #ffffff; --bg: #f0f4fb;
  }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-wrapper { display: flex; width: 900px; max-width: 98vw; min-height: 520px; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(26,86,219,0.15); }
  .login-left {
    flex: 1; background: linear-gradient(140deg, #1a3c6e 0%, #1a56db 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 40px; color: white; position: relative; overflow: hidden;
  }
  .login-left::before { content: ''; position: absolute; width: 260px; height: 260px; border-radius: 50%; background: rgba(255,255,255,0.07); top: -60px; right: -60px; }
  .login-left::after { content: ''; position: absolute; width: 180px; height: 180px; border-radius: 50%; background: rgba(255,255,255,0.06); bottom: -40px; left: -40px; }
  .brand-icon { font-size: 56px; margin-bottom: 16px; }
  .brand-name { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .brand-tagline { font-size: 14px; opacity: 0.75; margin-top: 8px; text-align: center; }
  .login-right { flex: 1; background: white; padding: 52px 44px; display: flex; flex-direction: column; justify-content: center; }
  .login-right h2 { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .login-right p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  label { font-size: 13px; font-weight: 700; color: var(--text); display: block; margin-bottom: 6px; }
  .input-wrap { position: relative; margin-bottom: 20px; }
  .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
  .input-wrap input { width: 100%; padding: 12px 14px 12px 42px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; background: #fafbff; }
  .input-wrap input:focus { border-color: var(--blue); background: white; }
  .remember-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .remember-row label { margin: 0; display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600; }
  .remember-row a { font-size: 13px; color: var(--blue); text-decoration: none; font-weight: 600; }
  .btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg, #1a56db, #1447b0); color: white; border: none; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
  .alt-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
  .alt-link a { color: var(--blue); font-weight: 700; text-decoration: none; }
  @media(max-width:640px) { .login-left { display: none; } }
</style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-left">
    <img src="{{ url_for('static', filename='images/logo-BoBB0p34.png') }}" 
       alt="Bravynex" style="width:80px;height:80px;object-fit:contain;margin-bottom:16px;">
    <div class="brand-name">BRAVYNEX</div>
  <div class="brand-tagline">ENGINEERING · EMPLOYEE PORTAL</div>
  </div>
  <div class="login-right">
    <h2>Welcome Back 👋</h2>
    <p>Sign in to access your dashboard</p>
    <form action="/login" method="POST">
      <label for="email">Employee ID / Email</label>
      <div class="input-wrap">
        <i class="bi bi-person-fill"></i>
        <input type="email" id="email" name="email" placeholder="Enter Employee ID or Email" required>
      </div>
      <label for="password">Password</label>
      <div class="input-wrap">
        <i class="bi bi-lock-fill"></i>
        <input type="password" id="password" name="password" placeholder="Enter Password" required>
      </div>
      <div class="remember-row">
        <label><input type="checkbox"> Remember Me</label>
        <a href="#">Forgot Password?</a>
      </div>
      <button type="submit" class="btn-primary">Login</button>
    </form>
    <div class="alt-link" style="margin-top:16px;">
      <a href="/admin" style="color:var(--muted);font-weight:700;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;">
        <i class="bi bi-shield-lock-fill"></i> Admin Login
      </a>
    </div>

  </div>
</div>
</body>
</html>
