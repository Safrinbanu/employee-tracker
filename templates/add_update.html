<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Update – BRAVYNEX</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue: #1a56db; --blue-dark: #1447b0; --sidebar: #1a3c6e; --text: #1e2d40; --muted: #6b7a90; --border: #dce3ee; --bg: #f0f4fb; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--sidebar); color: white; display: flex; flex-direction: column; min-height: 100vh; flex-shrink: 0; }
  .sidebar-brand { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; text-align: center; }
  .brand-logo { width: 64px; height: 64px; object-fit: contain; margin-bottom: 10px; }
  .brand-name { font-size: 20px; font-weight: 800; letter-spacing: 1px; }
  .brand-sub { font-size: 10px; opacity: 0.6; margin-top: 4px; letter-spacing: 1px; }
  .sidebar-nav { padding: 20px 12px; flex: 1; }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; opacity: 0.5; text-transform: uppercase; padding: 0 12px; margin-bottom: 8px; margin-top: 16px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; color: rgba(255,255,255,0.75); font-size: 14px; font-weight: 600; text-decoration: none; transition: background 0.2s; margin-bottom: 2px; }
  .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.12); color: white; }
  .nav-item i { font-size: 17px; }
  .sidebar-bottom { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.1); }
  .nav-item.logout { color: rgba(255,120,120,0.85); }
  .nav-item.logout:hover { background: rgba(220,38,38,0.15); color: #fca5a5; }
  .main { flex: 1; display: flex; flex-direction: column; }
  .topbar { background: white; border-bottom: 1px solid var(--border); padding: 16px 28px; }
  .topbar h1 { font-size: 20px; font-weight: 800; color: var(--text); }
  .topbar p { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .content { padding: 28px; flex: 1; }
  .form-card { background: white; border-radius: 14px; padding: 32px; box-shadow: 0 2px 12px rgba(26,60,110,0.06); max-width: 680px; }
  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .card-header .icon { width: 48px; height: 48px; background: #e8f0fe; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--blue); }
  .card-header h2 { font-size: 20px; font-weight: 800; color: var(--text); }
  .card-header p { font-size: 13px; color: var(--muted); margin-top: 2px; }
  label { font-size: 13px; font-weight: 700; color: var(--text); display: block; margin-bottom: 8px; }
  .form-group { margin-bottom: 20px; }
  textarea { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; background: #fafbff; resize: vertical; min-height: 120px; }
  textarea:focus { border-color: var(--blue); background: white; }
  .notes-input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; background: #fafbff; }
  .notes-input:focus { border-color: var(--blue); background: white; }
  .file-upload { border: 1.5px dashed var(--border); border-radius: 10px; padding: 16px; background: #fafbff; display: flex; align-items: center; gap: 12px; }
  .btn-submit { padding: 13px 32px; background: linear-gradient(135deg, #1a56db, #1447b0); color: white; border: none; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  .btn-submit:hover { opacity: 0.92; }
  .btn-back { padding: 13px 24px; background: #f1f5f9; color: var(--muted); border: none; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-right: 10px; }
  .btn-back:hover { background: var(--border); }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand">
    <img class="brand-logo" src="{{ url_for('static', filename='images/logo-BoBB0p34.png') }}" alt="Bravynex">
    <div class="brand-name">BRAVYNEX</div>
    <div class="brand-sub">ENGINEERING · EMPLOYEE PORTAL</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Main</div>
    <a href="/dashboard" class="nav-item"><i class="bi bi-grid-fill"></i> Dashboard</a>
    <div class="nav-label">Attendance</div>
    <a href="/attendance" class="nav-item"><i class="bi bi-calendar-check-fill"></i> My Attendance</a>
    <div class="nav-label">Updates</div>
    <a href="/add-update" class="nav-item active"><i class="bi bi-plus-circle-fill"></i> Add Daily Update</a>
    <a href="/updates" class="nav-item"><i class="bi bi-journal-text"></i> View Updates</a>
    <div class="nav-label">Admin</div>
    <a href="/admin" class="nav-item"><i class="bi bi-shield-lock-fill"></i> Admin Login</a>
  </nav>
  <div class="sidebar-bottom">
    <a href="/logout" class="nav-item logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <h1>Daily Update</h1>
    <p>Submit your work report for today</p>
  </div>
  <div class="content">
    <div class="form-card">
      <div class="card-header">
        <div class="icon"><i class="bi bi-pencil-square"></i></div>
        <div>
          <h2>Submit Your Work Report</h2>
          <p>Fill in the details about your work today</p>
        </div>
      </div>
      <form method="POST">
        <div class="form-group">
          <label>Tasks Completed Today</label>
          <textarea name="work_update" placeholder="Describe the tasks you completed today..." required></textarea>
        </div>
        <div class="form-group">
          <label>Additional Notes</label>
          <input type="text" class="notes-input" placeholder="Enter any notes or issues...">
        </div>
        <div class="form-group">
          <label>Attach Files</label>
          <div class="file-upload">
            <i class="bi bi-paperclip" style="color:var(--muted);font-size:18px"></i>
            <input type="file" name="attachment">
          </div>
        </div>
        <a href="/dashboard" class="btn-back"><i class="bi bi-arrow-left"></i> Back</a>
        <button type="submit" class="btn-submit"><i class="bi bi-send-fill"></i> Submit Update</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
