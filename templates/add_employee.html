<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Employee – BRAVYNEX</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue: #1a56db; --blue-dark: #1447b0; --sidebar: #111827; --text: #1e2d40; --muted: #6b7a90; --border: #dce3ee; --bg: #f0f4fb; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); display: flex; min-height: 100vh; }
  .sidebar { width: 250px; background: var(--sidebar); color: white; display: flex; flex-direction: column; min-height: 100vh; flex-shrink: 0; }
  .sidebar-brand { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; align-items: center; text-align: center; }
  .brand-logo { width: 64px; height: 64px; object-fit: contain; margin-bottom: 10px; }
  .brand-name { font-size: 20px; font-weight: 800; letter-spacing: 1px; }
  .brand-sub { font-size: 10px; opacity: 0.6; margin-top: 4px; letter-spacing: 1px; }
  .admin-tag { display: inline-block; background: rgba(239,68,68,0.15); color: #f87171; border-radius: 20px; padding: 3px 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; margin-top: 8px; }
  .sidebar-nav { padding: 20px 12px; flex: 1; }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; opacity: 0.4; text-transform: uppercase; padding: 0 12px; margin-bottom: 8px; margin-top: 16px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; color: rgba(255,255,255,0.65); font-size: 14px; font-weight: 600; text-decoration: none; transition: background 0.2s; margin-bottom: 2px; }
  .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; }
  .nav-item i { font-size: 17px; }
  .sidebar-bottom { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
  .nav-item.logout { color: rgba(255,120,120,0.85); }
  .nav-item.logout:hover { background: rgba(220,38,38,0.15); color: #fca5a5; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar { background: white; border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 20px; font-weight: 800; color: var(--text); }
  .topbar p { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .btn-back { padding: 9px 18px; background: white; color: var(--text); border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .btn-back:hover { background: var(--bg); }
  .content { padding: 28px; flex: 1; display: flex; align-items: flex-start; justify-content: center; }
  .card { background: white; border-radius: 14px; padding: 36px; box-shadow: 0 2px 12px rgba(26,60,110,0.06); width: 100%; max-width: 480px; }
  .card-title { font-size: 18px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .card-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  label { font-size: 13px; font-weight: 700; color: var(--text); display: block; margin-bottom: 6px; }
  .input-wrap { position: relative; margin-bottom: 20px; }
  .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
  .input-wrap input { width: 100%; padding: 12px 14px 12px 42px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; background: #fafbff; }
  .input-wrap input:focus { border-color: var(--blue); background: white; }
  .btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg, #16a34a, #15803d); color: white; border: none; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary:hover { opacity: 0.92; }
  .alert-error { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand">
    <img class="brand-logo" src="{{ url_for('static', filename='images/logo-BoBB0p34.png') }}" alt="Bravynex">
    <div class="brand-name">BRAVYNEX</div>
    <div class="brand-sub">ENGINEERING · ADMIN PANEL</div>
    <div class="admin-tag">ADMIN</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Overview</div>
    <a href="/admin-dashboard" class="nav-item"><i class="bi bi-grid-fill"></i> Dashboard</a>
    <div class="nav-label">Reports</div>
    <a href="/admin-attendance" class="nav-item"><i class="bi bi-calendar-check-fill"></i> Attendance Report</a>
    <div class="nav-label">Employees</div>
    <a href="/admin/add-employee" class="nav-item active"><i class="bi bi-person-plus-fill"></i> Add Employee</a>
  </nav>
  <div class="sidebar-bottom">
    <a href="/admin-logout" class="nav-item logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <div>
      <h1>Add Employee</h1>
      <p>Register a new employee account</p>
    </div>
    <a href="/admin-dashboard" class="btn-back"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-title"><i class="bi bi-person-plus-fill" style="color:var(--blue)"></i> New Employee</div>
      <div class="card-sub">Fill in the details below to create an employee account.</div>
      {% if error %}
      <div class="alert-error"><i class="bi bi-exclamation-circle-fill"></i> {{ error }}</div>
      {% endif %}
      <form method="POST">
        <label>Full Name</label>
        <div class="input-wrap">
          <i class="bi bi-person-fill"></i>
          <input type="text" name="name" placeholder="Enter employee's full name" required>
        </div>
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="bi bi-envelope-fill"></i>
          <input type="email" name="email" placeholder="Enter employee's email" required>
        </div>
        <label>Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock-fill"></i>
          <input type="password" name="password" placeholder="Set a password for the employee" required>
        </div>
        <button type="submit" class="btn-primary"><i class="bi bi-person-check-fill"></i> Register Employee</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
