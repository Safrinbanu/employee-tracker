<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – YourCompany</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --text: #1e2d40; --muted: #6b7a90; --border: #dce3ee; --bg: #f0f4fb; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-wrapper { display: flex; width: 860px; max-width: 98vw; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(26,60,110,0.15); }
  .login-left { flex: 1; background: linear-gradient(140deg, #111827 0%, #1f2937 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 40px; color: white; position: relative; overflow: hidden; }
  .login-left::before { content: ''; position: absolute; width: 240px; height: 240px; border-radius: 50%; background: rgba(255,255,255,0.04); top: -60px; right: -60px; }
  .login-left::after { content: ''; position: absolute; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.04); bottom: -40px; left: -40px; }
  .brand-icon { font-size: 56px; margin-bottom: 16px; color: #94a3b8; }
  .brand-name { font-size: 26px; font-weight: 800; }
  .brand-tagline { font-size: 13px; opacity: 0.5; margin-top: 8px; text-align: center; }
  .admin-badge { margin-top: 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 6px 16px; font-size: 12px; font-weight: 700; letter-spacing: 1px; color: #94a3b8; }
  .login-right { flex: 1; background: white; padding: 52px 44px; display: flex; flex-direction: column; justify-content: center; }
  .login-right h2 { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .login-right p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  label { font-size: 13px; font-weight: 700; color: var(--text); display: block; margin-bottom: 6px; }
  .input-wrap { position: relative; margin-bottom: 20px; }
  .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
  .input-wrap input { width: 100%; padding: 12px 14px 12px 42px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; background: #fafbff; }
  .input-wrap input:focus { border-color: #374151; background: white; }
  .btn-login { width: 100%; padding: 13px; background: linear-gradient(135deg, #111827, #374151); color: white; border: none; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  .btn-login:hover { opacity: 0.88; }
  .back-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
  .back-link a { color: #1a56db; font-weight: 700; text-decoration: none; }
  @media(max-width:640px) { .login-left { display: none; } }
</style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-left">
    <div class="brand-icon"><i class="bi bi-shield-lock-fill"></i></div>
    <div class="brand-name">Admin Portal</div>
    <div class="brand-tagline">Restricted Access – Authorized Personnel Only</div>
    <div class="admin-badge">ADMIN ACCESS</div>
  </div>
  <div class="login-right">
    <h2>Admin Login</h2>
    <p>Sign in with your administrator credentials</p>
    <form method="POST">
      <label>Username</label>
      <div class="input-wrap">
        <i class="bi bi-person-badge-fill"></i>
        <input type="text" name="username" placeholder="Enter admin username" required>
      </div>
      <label>Password</label>
      <div class="input-wrap">
        <i class="bi bi-lock-fill"></i>
        <input type="password" name="password" placeholder="Enter admin password" required>
      </div>
      <button type="submit" class="btn-login"><i class="bi bi-shield-check"></i> Login as Admin</button>
    </form>
    <div class="back-link"><a href="/"><i class="bi bi-arrow-left"></i> Back to Employee Login</a></div>
  </div>
</div>
</body>
</html>
